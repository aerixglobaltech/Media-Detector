{% extends "base.html" %}
{% set active_page = 'settings' %}

{% block content %}
<div style="height: calc(100vh - 53px); overflow-y: auto; background: var(--bg); padding: 28px;">
<div style="background: var(--surface); border-radius: 14px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); padding: 32px 40px; min-height: calc(100vh - 53px - 56px);">

  <a href="/settings" class="s-back">‹ Back to Settings</a>
  <h2 class="s-mod-title">My Profile</h2>
  <p class="s-mod-sub">View your system identity and company information.</p>
  
  <div style="max-width:560px; margin-top:28px;">
    <div class="s-field"><label>Full Name</label><input type="text" id="profile-name" readonly /></div>
    <div class="s-field"><label>Email Address</label><input type="text" id="profile-email" readonly /></div>
    <div class="s-field"><label>Company / Organization</label><input type="text" id="profile-company" readonly /></div>
  </div>

</div>
</div>

<style>
.s-back { display:inline-block; background:none; border: 1px solid var(--border); padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; margin-bottom: 24px; transition: all 0.2s; text-decoration:none; }
.s-back:hover { border-color: var(--accent); color: var(--accent); }
.s-mod-title { font-size: 22px; font-weight: 800; color: var(--text); margin:0 0 6px 0; }
.s-mod-sub { font-size: 13px; color: var(--muted); margin:0; }
.s-field { margin-bottom: 18px; }
.s-field label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.s-field input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; color: var(--text); background: var(--surface2); outline: none; }
</style>

<script>
  document.addEventListener('DOMContentLoaded', loadUserProfile);
  async function loadUserProfile() {
    try {
      const res = await fetch('/api/user_profile');
      const data = await res.json();
      if (!data.error) {
        document.getElementById('profile-name').value = data.name||'';
        document.getElementById('profile-email').value = data.email||'';
        document.getElementById('profile-company').value = data.company||'';
      }
    } catch (e) {}
  }
</script>
{% endblock %}
